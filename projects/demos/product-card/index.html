<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品展示卡片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #F5F7FA 0%, #E8EEF5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .product-card {
            background: linear-gradient(145deg, #FFFFFF 0%, #FAFBFC 100%);
            border-radius: 24px;
            box-shadow: 
                0 4px 6px -1px rgba(0, 0, 0, 0.05),
                0 10px 15px -3px rgba(0, 0, 0, 0.08),
                0 20px 25px -5px rgba(0, 0, 0, 0.1),
                0 0 0 1px rgba(0, 0, 0, 0.02);
            width: 100%;
            max-width: 380px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #0066CC 0%, #0088FF 50%, #0066CC 100%);
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .product-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 
                0 8px 12px -2px rgba(0, 0, 0, 0.08),
                0 20px 30px -5px rgba(0, 0, 0, 0.12),
                0 40px 50px -10px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(0, 102, 204, 0.1);
        }

        .product-image {
            position: relative;
            width: 100%;
            height: 280px;
            background: linear-gradient(135deg, #E8F4FD 0%, #D6E9F8 50%, #C5DEF8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .product-image::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .product-image img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 20px 40px rgba(0, 102, 204, 0.3));
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .product-card:hover .product-image img {
            transform: scale(1.1) rotate(2deg);
        }

        .badge {
            position: absolute;
            top: 16px;
            right: 16px;
            background: linear-gradient(135deg, #0066CC 0%, #0088FF 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(0, 102, 204, 0.4);
            z-index: 2;
        }

        .product-content {
            padding: 28px 24px 24px;
        }

        .product-category {
            font-size: 12px;
            font-weight: 600;
            color: #0066CC;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .product-title {
            font-size: 24px;
            font-weight: 700;
            color: #1A1E24;
            margin-bottom: 12px;
            line-height: 1.3;
            letter-spacing: -0.5px;
        }

        .product-description {
            font-size: 14px;
            color: #6B7280;
            line-height: 1.7;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }

        .feature-tag {
            background: linear-gradient(135deg, #F0F4F8 0%, #E8EEF5 100%);
            color: #4B5563;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid rgba(0, 102, 204, 0.1);
            transition: all 0.3s ease;
        }

        .feature-tag:hover {
            background: linear-gradient(135deg, #0066CC 0%, #0088FF 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 102, 204, 0.3);
        }

        .price-section {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #E5E7EB;
        }

        .price {
            font-size: 32px;
            font-weight: 800;
            color: #1A1E24;
            letter-spacing: -1px;
        }

        .price-currency {
            font-size: 16px;
            font-weight: 600;
            color: #6B7280;
            margin-right: 2px;
        }

        .price-original {
            font-size: 16px;
            color: #9CA3AF;
            text-decoration: line-through;
            font-weight: 500;
        }

        .price-discount {
            background: linear-gradient(135deg, #EF4444 0%, #F97316 100%);
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            margin-left: auto;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            outline: none;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0066CC 0%, #0088FF 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(0, 102, 204, 0.4);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 102, 204, 0.5);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #F5F7FA 0%, #E8EEF5 100%);
            color: #1A1E24;
            border: 2px solid #E5E7EB;
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #E8EEF5 0%, #D6E9F8 100%);
            border-color: #0066CC;
            transform: translateY(-3px);
            box-shadow: 0 4px 14px rgba(0, 102, 204, 0.2);
        }

        .btn-secondary:active {
            transform: translateY(-1px);
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
        }

        .stars {
            display: flex;
            gap: 2px;
        }

        .star {
            width: 18px;
            height: 18px;
            fill: #FBBF24;
        }

        .star.empty {
            fill: #E5E7EB;
        }

        .rating-text {
            font-size: 13px;
            color: #6B7280;
            font-weight: 500;
        }

        .rating-count {
            font-size: 13px;
            color: #9CA3AF;
            font-weight: 400;
        }

        @media (max-width: 480px) {
            .product-card {
                max-width: 100%;
            }
            
            .product-image {
                height: 240px;
            }
            
            .product-image img {
                width: 150px;
                height: 150px;
            }
            
            .product-content {
                padding: 24px 20px 20px;
            }
            
            .product-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="product-card">
        <div class="badge">热销新品</div>
        <div class="product-image">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="productGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#0066CC;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#0088FF;stop-opacity:1" />
                    </linearGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                <circle cx="100" cy="100" r="80" fill="url(#productGradient)" filter="url(#glow)" opacity="0.9"/>
                <circle cx="100" cy="100" r="60" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
                <circle cx="100" cy="100" r="45" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>
                <path d="M70 100 L90 120 L130 80" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
        </div>
        <div class="product-content">
            <div class="product-category">智能设备</div>
            <h2 class="product-title">ProMax 智能手表</h2>
            <p class="product-description">全新升级的智能穿戴设备，搭载先进传感器技术，精准监测您的健康数据，支持50+种运动模式，续航长达14天。</p>
            
            <div class="rating">
                <div class="stars">
                    <svg class="star" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <svg class="star" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <svg class="star" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <svg class="star" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <svg class="star" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                </div>
                <span class="rating-text">5.0</span>
                <span class="rating-count">(2,847 评价)</span>
            </div>
            
            <div class="features">
                <span class="feature-tag">心率监测</span>
                <span class="feature-tag">GPS定位</span>
                <span class="feature-tag">防水IP68</span>
                <span class="feature-tag">14天续航</span>
            </div>
            
            <div class="price-section">
                <div>
                    <span class="price-currency">¥</span>
                    <span class="price">1,299</span>
                </div>
                <span class="price-original">¥1,699</span>
                <span class="price-discount">-24%</span>
            </div>
            
            <div class="action-buttons">
                <button class="btn btn-primary">立即购买</button>
                <button class="btn btn-secondary">加入购物车</button>
            </div>
        </div>
    </div>
</body>
</html>
