<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAE IDE Settings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #0f1115;
            color: #ffffff;
        }

        .settings-container {
            display: flex;
            min-height: 100vh;
        }

        .settings-sidebar {
            width: 240px;
            padding: 32px 24px;
            background-color: #0f1115;
            border-right: 1px solid #1f2937;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-title {
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar-link {
            background: none;
            border: none;
            color: #9ca3af;
            text-align: left;
            padding: 10px 12px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .sidebar-link:hover {
            color: #ffffff;
            background-color: #1f2937;
        }

        .sidebar-link.active {
            color: #34d399;
            background-color: rgba(52, 211, 153, 0.1);
        }

        .settings-content {
            flex: 1;
            padding: 48px 64px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .welcome-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .welcome-title {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
        }

        .welcome-subtitle {
            font-size: 14px;
            color: #9ca3af;
        }

        .badges {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            background-color: #1f2937;
            color: #9ca3af;
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 13px;
            font-weight: 500;
        }

        .active-days-card {
            background-color: #1a1d23;
            border: 1px solid #2d3139;
            border-radius: 12px;
            padding: 24px;
            max-width: 800px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 20px;
        }

        .heatmap-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .heatmap-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .heatmap-header span {
            font-size: 11px;
            color: #6b7280;
            text-align: center;
            text-transform: uppercase;
        }

        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .heatmap-cell {
            width: 100%;
            aspect-ratio: 1;
            min-width: 12px;
            max-width: 16px;
            border-radius: 2px;
            background-color: #1f2937;
            transition: all 0.15s ease;
        }

        .heatmap-cell:hover {
            transform: scale(1.2);
        }

        .heatmap-cell.level-1 {
            background-color: #065f46;
        }

        .heatmap-cell.level-2 {
            background-color: #10b981;
        }

        .heatmap-cell.level-3 {
            background-color: #34d399;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1d23;
        }

        ::-webkit-scrollbar-thumb {
            background: #2d3139;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #374151;
        }

        @media (max-width: 768px) {
            .settings-container {
                flex-direction: column;
            }
            
            .settings-sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #1f2937;
                padding: 16px;
            }
            
            .sidebar-section {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 8px;
            }
            
            .sidebar-title {
                width: 100%;
            }
            
            .sidebar-nav {
                flex-direction: row;
                flex-wrap: wrap;
            }
            
            .settings-content {
                padding: 24px;
            }
            
            .active-days-card {
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        const { useState } = React;

        const mockData = {
            user: {
                name: 'li heng',
                dayCount: 159,
                badges: ['Guru', 'Single-Model BFF', 'Midday Maven']
            },
            activeDays: generateActiveDaysData()
        };

        function generateActiveDaysData() {
            const weeks = 24;
            const daysPerWeek = 7;
            const data = [];
            for (let w = 0; w < weeks; w++) {
                for (let d = 0; d < daysPerWeek; d++) {
                    const random = Math.random();
                    let level = 0;
                    if (random > 0.7) level = 1;
                    if (random > 0.85) level = 2;
                    if (random > 0.95) level = 3;
                    data.push({ week: w, day: d, level });
                }
            }
            return data;
        }

        function SettingsPage() {
            const [activeNav, setActiveNav] = useState('profile');

            const navItems = {
                account: [
                    { id: 'profile', label: 'Profile' },
                    { id: 'settings', label: 'Settings' },
                    { id: 'subscriptions', label: 'Subscriptions' }
                ],
                subscription: [
                    { id: 'plan-billings', label: 'Plan & Billings' },
                    { id: 'usage', label: 'Usage' }
                ]
            };

            return (
                <div className="settings-container">
                    <aside className="settings-sidebar">
                        <div className="sidebar-section">
                            <h3 className="sidebar-title">ACCOUNT</h3>
                            <nav className="sidebar-nav">
                                {navItems.account.map(item => (
                                    <button
                                        key={item.id}
                                        className={`sidebar-link ${activeNav === item.id ? 'active' : ''}`}
                                        onClick={() => setActiveNav(item.id)}
                                    >
                                        {item.label}
                                    </button>
                                ))}
                            </nav>
                        </div>
                        <div className="sidebar-section">
                            <h3 className="sidebar-title">SUBSCRIPTION</h3>
                            <nav className="sidebar-nav">
                                {navItems.subscription.map(item => (
                                    <button
                                        key={item.id}
                                        className={`sidebar-link ${activeNav === item.id ? 'active' : ''}`}
                                        onClick={() => setActiveNav(item.id)}
                                    >
                                        {item.label}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </aside>

                    <main className="settings-content">
                        <div className="welcome-section">
                            <h1 className="welcome-title">Hello! {mockData.user.name}</h1>
                            <p className="welcome-subtitle">
                                This is your day {mockData.user.dayCount} of using TRAE IDE.
                            </p>
                            <div className="badges">
                                {mockData.user.badges.map((badge, index) => (
                                    <span key={index} className="badge">#{badge}</span>
                                ))}
                            </div>
                        </div>

                        <div className="active-days-card">
                            <h2 className="card-title">Active Days</h2>
                            <div className="heatmap-container">
                                <div className="heatmap-header">
                                    <span>Mon</span>
                                    <span>Tue</span>
                                    <span>Wed</span>
                                    <span>Thu</span>
                                    <span>Fri</span>
                                    <span>Sat</span>
                                    <span>Sun</span>
                                </div>
                                <div className="heatmap-grid">
                                    {mockData.activeDays.map((day, index) => (
                                        <div
                                            key={index}
                                            className={`heatmap-cell level-${day.level}`}
                                            title={`Week ${day.week + 1}, Day ${day.day + 1}`}
                                        />
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SettingsPage />);
    </script>
</body>
</html>
