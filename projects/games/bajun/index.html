<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>八骏图 - 徐悲鸿风格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'STKaiti', 'KaiTi', serif;
            overflow: hidden;
        }
        .title {
            color: #e8d5b7;
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            letter-spacing: 20px;
        }
        .subtitle {
            color: #a08060;
            font-size: 1.2rem;
            margin-bottom: 30px;
            letter-spacing: 5px;
        }
        #canvas-container {
            position: relative;
            border: 8px solid #8b4513;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(139, 69, 19, 0.5), inset 0 0 100px rgba(0,0,0,0.3);
            background: linear-gradient(to bottom, #87ceeb 0%, #e0f0ff 30%, #90c695 60%, #5a8c5a 100%);
        }
        canvas {
            display: block;
        }
        .seal {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            background: #c41e3a;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.5rem;
            writing-mode: vertical-rl;
            letter-spacing: 5px;
            opacity: 0.9;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        button {
            padding: 12px 30px;
            font-size: 1rem;
            background: linear-gradient(145deg, #8b4513, #654321);
            color: #e8d5b7;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            letter-spacing: 3px;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(139, 69, 19, 0.5);
        }
    </style>
</head>
<body>
    <h1 class="title">八骏图</h1>
    <p class="subtitle">徐悲鸿风格 · 动态水墨</p>
    <div id="canvas-container">
        <canvas id="horseCanvas" width="1200" height="500"></canvas>
        <div class="seal">悲鸿</div>
    </div>
    <div class="controls">
        <button onclick="toggleAnimation()">暂停/继续</button>
        <button onclick="changeSpeed()">切换速度</button>
    </div>

    <script>
        const canvas = document.getElementById('horseCanvas');
        const ctx = canvas.getContext('2d');
        let animationId;
        let isRunning = true;
        let speedMultiplier = 1;
        let time = 0;

        const horses = [];
        const horseColors = [
            { body: '#2c1810', mane: '#1a0f0a', highlight: '#4a3020' },
            { body: '#8b4513', mane: '#5c2d0e', highlight: '#a0522d' },
            { body: '#1c1c1c', mane: '#0a0a0a', highlight: '#3d3d3d' },
            { body: '#d2691e', mane: '#8b4513', highlight: '#e07020' },
            { body: '#f5f5dc', mane: '#d4c4a8', highlight: '#fffff0' },
            { body: '#4a3728', mane: '#2c1810', highlight: '#6b4423' },
            { body: '#800020', mane: '#4a0012', highlight: '#a00028' },
            { body: '#c0c0c0', mane: '#808080', highlight: '#e0e0e0' }
        ];

        function initHorses() {
            const positions = [
                { x: 100, y: 280, scale: 1.0, speed: 1.0 },
                { x: 250, y: 320, scale: 0.85, speed: 1.1 },
                { x: 400, y: 260, scale: 1.1, speed: 0.95 },
                { x: 550, y: 300, scale: 0.9, speed: 1.05 },
                { x: 700, y: 270, scale: 1.05, speed: 1.0 },
                { x: 850, y: 310, scale: 0.88, speed: 1.08 },
                { x: 1000, y: 285, scale: 0.95, speed: 1.02 },
                { x: 1100, y: 330, scale: 0.8, speed: 1.12 }
            ];

            positions.forEach((pos, i) => {
                horses.push({
                    x: pos.x,
                    y: pos.y,
                    scale: pos.scale,
                    speed: pos.speed,
                    phase: Math.random() * Math.PI * 2,
                    color: horseColors[i],
                    legPhase: Math.random() * Math.PI * 2,
                    jumpHeight: 0,
                    jumpPhase: Math.random() * Math.PI * 2
                });
            });
        }

        function drawHorse(horse, time) {
            ctx.save();
            ctx.translate(horse.x, horse.y + horse.jumpHeight);
            ctx.scale(horse.scale, horse.scale);

            const legSpeed = 0.15 * speedMultiplier;
            const legAngle1 = Math.sin(time * legSpeed + horse.legPhase) * 0.5;
            const legAngle2 = Math.sin(time * legSpeed + horse.legPhase + Math.PI) * 0.5;
            const legAngle3 = Math.sin(time * legSpeed + horse.legPhase + Math.PI * 0.5) * 0.4;
            const legAngle4 = Math.sin(time * legSpeed + horse.legPhase + Math.PI * 1.5) * 0.4;

            ctx.fillStyle = horse.color.body;
            ctx.strokeStyle = horse.color.mane;
            ctx.lineWidth = 2;

            ctx.beginPath();
            ctx.ellipse(0, 0, 60, 35, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(50, -10);
            ctx.quadraticCurveTo(90, -30, 100, -50);
            ctx.quadraticCurveTo(105, -55, 110, -50);
            ctx.quadraticCurveTo(115, -45, 110, -35);
            ctx.quadraticCurveTo(100, -20, 60, 0);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = horse.color.mane;
            ctx.beginPath();
            ctx.moveTo(70, -25);
            ctx.quadraticCurveTo(95, -35, 105, -45);
            ctx.fill();

            ctx.fillStyle = horse.color.body;
            ctx.beginPath();
            ctx.arc(95, -45, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#1a0f0a';
            ctx.beginPath();
            ctx.arc(98, -46, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = horse.color.body;
            ctx.beginPath();
            ctx.moveTo(95, -40);
            ctx.quadraticCurveTo(100, -35, 95, -30);
            ctx.quadraticCurveTo(90, -33, 95, -40);
            ctx.fill();

            ctx.fillStyle = horse.color.mane;
            ctx.beginPath();
            ctx.moveTo(40, -30);
            for (let i = 0; i < 15; i++) {
                const waveOffset = Math.sin(time * 0.1 + i * 0.3) * 5;
                ctx.quadraticCurveTo(
                    50 + i * 4, -35 - i * 2 + waveOffset,
                    55 + i * 4, -30 - i * 3 + waveOffset
                );
            }
            ctx.quadraticCurveTo(100, -60, 80, -30);
            ctx.quadraticCurveTo(60, -25, 40, -30);
            ctx.fill();

            drawLeg(-30, 25, legAngle1, horse, true);
            drawLeg(-10, 28, legAngle2, horse, true);
            drawLeg(20, 25, -legAngle3, horse, false);
            drawLeg(40, 28, -legAngle4, horse, false);

            ctx.fillStyle = horse.color.body;
            ctx.beginPath();
            ctx.moveTo(-55, 0);
            ctx.quadraticCurveTo(-80, -20, -90, 10);
            ctx.quadraticCurveTo(-85, 30, -60, 20);
            ctx.quadraticCurveTo(-50, 15, -55, 0);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = horse.color.mane;
            ctx.beginPath();
            ctx.moveTo(-60, -5);
            const tailWave = Math.sin(time * 0.12) * 10;
            ctx.quadraticCurveTo(-80, -10 + tailWave, -95, 5 + tailWave);
            ctx.quadraticCurveTo(-100, 20 + tailWave, -85, 35 + tailWave);
            ctx.quadraticCurveTo(-70, 40 + tailWave * 0.5, -65, 25);
            ctx.quadraticCurveTo(-60, 10, -60, -5);
            ctx.fill();

            ctx.restore();
        }

        function drawLeg(x, y, angle, horse, isFront) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);

            ctx.fillStyle = horse.color.body;
            ctx.strokeStyle = horse.color.mane;
            ctx.lineWidth = 2;

            ctx.beginPath();
            if (isFront) {
                ctx.moveTo(-5, 0);
                ctx.lineTo(-8, 50);
                ctx.lineTo(8, 50);
                ctx.lineTo(5, 0);
            } else {
                ctx.moveTo(-4, 0);
                ctx.lineTo(-6, 45);
                ctx.lineTo(6, 45);
                ctx.lineTo(4, 0);
            }
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#2c1810';
            ctx.beginPath();
            if (isFront) {
                ctx.ellipse(0, 52, 10, 6, 0, 0, Math.PI * 2);
            } else {
                ctx.ellipse(0, 47, 8, 5, 0, 0, Math.PI * 2);
            }
            ctx.fill();

            ctx.restore();
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87ceeb');
            gradient.addColorStop(0.3, '#e0f0ff');
            gradient.addColorStop(0.6, '#90c695');
            gradient.addColorStop(1, '#5a8c5a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            for (let i = 0; i < 5; i++) {
                const cloudX = (time * 0.5 + i * 300) % (canvas.width + 200) - 100;
                drawCloud(cloudX, 50 + i * 20, 80 + i * 10);
            }

            ctx.fillStyle = '#4a7c4a';
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 80);
            ctx.quadraticCurveTo(200, canvas.height - 120, 400, canvas.height - 90);
            ctx.quadraticCurveTo(600, canvas.height - 60, 800, canvas.height - 100);
            ctx.quadraticCurveTo(1000, canvas.height - 80, 1200, canvas.height - 95);
            ctx.lineTo(canvas.width, canvas.height);
            ctx.lineTo(0, canvas.height);
            ctx.fill();

            ctx.fillStyle = '#3d6b3d';
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 60);
            ctx.quadraticCurveTo(300, canvas.height - 100, 600, canvas.height - 70);
            ctx.quadraticCurveTo(900, canvas.height - 40, 1200, canvas.height - 65);
            ctx.lineTo(canvas.width, canvas.height);
            ctx.lineTo(0, canvas.height);
            ctx.fill();

            drawBamboo(50, canvas.height - 100);
            drawBamboo(1150, canvas.height - 120);
            drawTree(1100, canvas.height - 80);
        }

        function drawCloud(x, y, size) {
            ctx.beginPath();
            ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y - size * 0.2, size * 0.4, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y, size * 0.45, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y + size * 0.1, size * 0.35, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawBamboo(x, y) {
            ctx.strokeStyle = '#2d5a2d';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x, y - 150);
            ctx.stroke();

            ctx.strokeStyle = '#3d7a3d';
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(x + 15, y + 20);
            ctx.lineTo(x + 15, y - 100);
            ctx.stroke();

            ctx.fillStyle = '#4a9a4a';
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.ellipse(x + 5, y - 30 - i * 40, 20, 5, -0.3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawTree(x, y) {
            ctx.fillStyle = '#5c4033';
            ctx.fillRect(x - 10, y - 80, 20, 100);

            ctx.fillStyle = '#2d5a2d';
            ctx.beginPath();
            ctx.arc(x, y - 100, 50, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x - 30, y - 70, 35, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 35, y - 80, 40, 0, Math.PI * 2);
            ctx.fill();
        }

        function animate() {
            if (!isRunning) {
                animationId = requestAnimationFrame(animate);
                return;
            }

            time++;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();

            horses.forEach((horse, index) => {
                horse.jumpHeight = Math.sin(time * 0.05 * horse.speed + horse.jumpPhase) * 8;
                drawHorse(horse, time);
            });

            animationId = requestAnimationFrame(animate);
        }

        function toggleAnimation() {
            isRunning = !isRunning;
        }

        function changeSpeed() {
            speedMultiplier = speedMultiplier === 1 ? 1.5 : speedMultiplier === 1.5 ? 0.7 : 1;
        }

        initHorses();
        animate();
    </script>
</body>
</html>
