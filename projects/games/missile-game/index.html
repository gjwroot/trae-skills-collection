<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞弹投掷小游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>春节爆竹投掷小游戏</h1>
        <div class="scoreboard">
            <div class="score-item">
                <span>得分:</span>
                <span id="score">0</span>
            </div>
            <div class="score-item">
                <span>回合:</span>
                <span id="round">1</span>
            </div>
        </div>
        <div class="game-area">
            <canvas id="gameCanvas" width="800" height="400"></canvas>
        </div>
        <div class="controls">
            <div class="control-group">
                <label for="angle">角度:</label>
                <input type="range" id="angle" min="0" max="90" value="45">
                <span id="angleValue">45°</span>
            </div>
            <div class="control-group">
                <label for="power">力度:</label>
                <input type="range" id="power" min="10" max="100" value="50">
                <span id="powerValue">50</span>
            </div>
            <button id="fireButton">发射</button>
            <button id="resetButton">重置</button>
        </div>
        <div class="instructions">
            <h3>游戏说明:</h3>
            <p>1. 调整角度和力度</p>
            <p>2. 点击发射按钮投掷飞弹</p>
            <p>3. 击中目标获得分数</p>
            <p>4. 每回合有3次机会</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
